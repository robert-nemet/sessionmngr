version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: session-manager-mcp
    main: ./cmd
    binary: session-manager-mcp

    env:
      - CGO_ENABLED=0

    goos:
      - linux
      - darwin

    goarch:
      - amd64
      - arm64

    ldflags:
      - -s -w
      - -X github.com/robert-nemet/sessionmngr/internal/version.Version={{.Version}}
      - -X github.com/robert-nemet/sessionmngr/internal/version.BuildTimestamp={{.Date}}

    flags:
      - -trimpath

  - id: session-summarizer
    main: ./cmd/session-summarizer
    binary: session-summarizer

    env:
      - CGO_ENABLED=0

    goos:
      - linux
      - darwin

    goarch:
      - amd64
      - arm64

    ldflags:
      - -s -w
      - -X github.com/robert-nemet/sessionmngr/internal/version.Version={{.Version}}
      - -X github.com/robert-nemet/sessionmngr/internal/version.BuildTimestamp={{.Date}}

    flags:
      - -trimpath

archives:
  - id: default
    formats:
      - 'tar.gz'

    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

    files:
      - LICENSE*
      - README*
      - CHANGELOG*

    format_overrides:
      - goos: windows
        formats:
          - 'zip'

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  use: github
  sort: asc

  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - typo
      - Merge pull request
      - Merge branch

  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0

    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1

    - title: Performance Improvements
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2

    - title: Others
      order: 999

release:
  github:
    owner: robert-nemet
    name: sessionmngr

  name_template: "{{.ProjectName}} {{.Version}}"

  header: |
    ## Session Manager MCP Server {{.Version}}

    A stateless Go-based MCP server for recording Claude conversations across multiple sessions.

    ### Installation

    Download the appropriate binary for your platform below, extract it, and follow the installation instructions in the README.

  footer: |
    ---

    **Full Changelog**: https://github.com/robert-nemet/sessionmngr/compare/{{ .PreviousTag }}...{{ .Tag }}

  draft: false
  prerelease: auto
  mode: replace

  disable: false

snapshot:
  version_template: "{{ incpatch .Version }}-next"

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"
